services:
  agent:
    build:
      context: .
      dockerfile: starter/Dockerfile
    volumes:
      - ./starter:/app/starter
      - ./data:/app/data
      - ./traces:/app/traces
    environment:
      - PYTHONPATH=/app/starter/src
      - TRACE_OUTPUT_DIR=/app/traces
    working_dir: /app/starter
    command: sh -c "uv sync --all-extras && uv run pytest -v"
